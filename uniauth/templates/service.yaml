apiVersion: v1
kind: Service
metadata:
  name: {{ include "uniauth.fullname" . }}-web
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "uniauth.fullname" . }}-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: {{ .Values.service.port }}
  type: {{ .Values.service.type }}
