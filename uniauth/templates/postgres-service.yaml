{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "uniauth.fullname" . }}-db
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "uniauth.fullname" . }}-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  clusterIP: None
{{- end }}
