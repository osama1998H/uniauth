  internal_api_handlers.TokenPairResponse:
    properties:
      access_token:
        example: eyJhbGci...
        type: string
      access_token_expires_at:
        example: "2026-03-27T16:00:00Z"
        type: string
      refresh_token:
        example: eyJhbGci...
        type: string
      refresh_token_expires_at:
        example: "2026-04-03T15:00:00Z"
        type: string
