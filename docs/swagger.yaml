  name: Users
- description: Organization profile management
  name: Organizations
- description: RBAC role and permission management
  name: Roles
- description: API key lifecycle management
  name: API Keys
- description: Audit log retrieval
  name: Audit
- description: Webhook endpoint management
  name: Webhooks
