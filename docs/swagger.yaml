securityDefinitions:
  ApiKeyAuth:
    description: API key for service-to-service authentication.
    in: header
    name: X-API-Key
    type: apiKey
  BearerAuth:
    description: 'Type "Bearer " followed by your JWT access token. Example: "Bearer
      eyJhbGci..."'
    in: header
    name: Authorization
    type: apiKey
