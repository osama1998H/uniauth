# TEMPLATE ONLY — do NOT commit real credentials to source control.
#
# Fill in the base64-encoded values before applying:
#   echo -n 'your-value' | base64
#
# For production, prefer an external secrets manager:
#   - External Secrets Operator (https://external-secrets.io)
#   - AWS Secrets Manager CSI driver
#   - HashiCorp Vault Agent Injector
apiVersion: v1
kind: Secret
metadata:
  name: uniauth-credentials
  namespace: uniauth
  labels:
    app.kubernetes.io/name: uniauth
    app.kubernetes.io/component: credentials
type: Opaque
data:
  # echo -n 'postgres://user:pass@host:5432/uniauth?sslmode=require' | base64
  DATABASE_URL: <base64-encoded-database-url>
  # echo -n 'redis://:password@host:6379/0' | base64
  REDIS_URL: <base64-encoded-redis-url>
  # echo -n 'your-jwt-secret-minimum-32-chars' | base64
  JWT_SECRET: <base64-encoded-jwt-secret>
  # SMTP credentials (optional — remove if not using email)
  # SMTP_USERNAME: <base64-encoded-smtp-username>
  # SMTP_PASSWORD: <base64-encoded-smtp-password>
