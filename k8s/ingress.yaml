# Ingress using the nginx ingress controller.
# Adjust annotations and host to match your environment.
#
# TLS example (cert-manager):
#   annotations:
#     cert-manager.io/cluster-issuer: letsencrypt-prod
#   tls:
#     - hosts:
#         - uniauth.example.com
#       secretName: uniauth-tls
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uniauth
  namespace: uniauth
  labels:
    app.kubernetes.io/name: uniauth
    app.kubernetes.io/component: server
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: uniauth.example.com   # change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uniauth
                port:
                  name: http
