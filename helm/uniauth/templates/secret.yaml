{{- if and (not .Values.secrets.existingSecret) .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "uniauth.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "uniauth.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from diffing secret values in plain text
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required" .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ required "secrets.redisUrl is required" .Values.secrets.redisUrl | quote }}
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  {{- if .Values.secrets.smtpUsername }}
  SMTP_USERNAME: {{ .Values.secrets.smtpUsername | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpPassword }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  {{- end }}
{{- end }}
