services:
  app:
    build: .
    container_name: uniauth
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://uniauth:uniauth@postgres:5432/uniauth?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production-use-a-long-random-string
      ENVIRONMENT: development
      PORT: 8080
      APP_BASE_URL: http://localhost:8080
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@uniauth.local
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: uniauth_postgres
    environment:
      POSTGRES_USER: uniauth
      POSTGRES_PASSWORD: uniauth
      POSTGRES_DB: uniauth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uniauth_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: email testing (dev only)
  mailhog:
    image: mailhog/mailhog
    container_name: uniauth_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI at http://localhost:8025

volumes:
  postgres_data:
